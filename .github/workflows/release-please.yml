name: Release Please

on:
    workflow_run:
        workflows: [CI]
        types: [completed]
        branches: [main]

permissions:
    contents: write
    pull-requests: write

jobs:
    release-please:
        if: github.event.workflow_run.conclusion == 'success'
        runs-on: ubuntu-latest
        steps:
            - uses: googleapis/release-please-action@v4
              id: release
              with:
                  release-type: simple
