name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    check:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - uses: astral-sh/setup-uv@v6

            - name: Build package
              run: uv build

            - name: Run tests
              run: uv run pytest --tb=short -q
              continue-on-error: true # remove once tests exist
